<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About & Contact / Lu Han</title>
    <meta name="description" content="Biography, statement, and contact for Lu Han.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/styles.css">
    <script src="./assets/js/site-data.js" defer></script>
    <script src="./assets/js/site.js" defer></script>
  </head>
  <body data-page="about" data-base=".">
    <header class="site-header">
      <div class="site-header__inner">
        <a class="brand" href="./index.html" aria-label="Lu Han home">
          <span class="brand__crest" aria-hidden="true"></span>
          <span class="brand__meta">
            <strong class="brand__name" data-artist-name>Lu Han</strong>
          </span>
        </a>
        <div class="site-nav">
          <nav class="site-nav__links" aria-label="Primary">
            <a href="./exhibitions.html" data-i18n="nav.exhibitions">Exhibitions</a>
            <a href="./works/index.html" data-i18n="nav.works">Works</a>
            <a href="./about.html" aria-current="page" data-i18n="nav.aboutContact">About&Contact</a>
          </nav>
          <div class="language-toggle" aria-label="Language switcher">
            <button class="language-toggle__button" type="button" data-lang-button="en">EN</button>
            <button class="language-toggle__button" type="button" data-lang-button="zh">中文</button>
          </div>
        </div>
      </div>
    </header>

    <main class="main page-shell">
      <section class="site-shell site-shell--wide">
        <div class="about-layout">
          <div class="about-stack">
            <section class="content-panel reveal">
              <h2 class="about-subtitle" data-i18n="about.bioTitle">Biography</h2>
              <div id="about-bio-paragraphs"></div>
            </section>

            <section class="content-panel reveal">
              <h2 class="about-subtitle" data-i18n="about.statementTitle">Statement</h2>
              <div id="about-statement-paragraphs"></div>
            </section>

          </div>

          <aside class="about-side">
            <figure class="about-portrait reveal">
              <img id="about-portrait-image" src="" alt="">
            </figure>

            <section class="info-panel reveal">
              <h2 class="about-subtitle" data-i18n="about.factsTitle">Profile</h2>
              <div class="info-list" id="about-profile-list"></div>
            </section>
          </aside>
        </div>

        <section class="about-contact-section">
          <div class="about-contact-head reveal">
            <h2 class="about-subtitle about-contact-title" data-i18n="contact.title">Contact</h2>
          </div>
          <div class="about-contact-grid">
            <article class="about-contact-card reveal">
              <div class="about-contact-card__line">
                <span class="contact-icon contact-icon--instagram" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6">
                    <defs>
                      <linearGradient id="ig-icon-gradient" x1="3" y1="21" x2="21" y2="3" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#feda75"></stop>
                        <stop offset="22%" stop-color="#fa7e1e"></stop>
                        <stop offset="48%" stop-color="#d62976"></stop>
                        <stop offset="74%" stop-color="#962fbf"></stop>
                        <stop offset="100%" stop-color="#4f5bd5"></stop>
                      </linearGradient>
                    </defs>
                    <rect x="3.25" y="3.25" width="17.5" height="17.5" rx="5.2" stroke="url(#ig-icon-gradient)"></rect>
                    <circle cx="12" cy="12" r="4.25" stroke="url(#ig-icon-gradient)"></circle>
                    <circle cx="17.2" cy="6.8" r="1.1" fill="url(#ig-icon-gradient)" stroke="none"></circle>
                  </svg>
                </span>
                <a class="about-contact-card__handle about-contact-card__handle--instagram" href="#" target="_blank" rel="noreferrer" data-social-link="instagram">luhanoil</a>
              </div>
            </article>

            <article class="about-contact-card reveal">
              <div class="about-contact-card__line">
                <span class="contact-icon contact-icon--xiaohongshu" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2.8" y="5" width="18.4" height="14" rx="4.2"></rect>
                    <text x="12" y="14.25" text-anchor="middle" font-size="6.1" font-weight="700" fill="currentColor" stroke="none" font-family="IBM Plex Sans, sans-serif">RED</text>
                  </svg>
                </span>
                <a class="about-contact-card__handle about-contact-card__handle--xiaohongshu" href="#" target="_blank" rel="noreferrer" data-social-link="xiaohongshu">LU_HAN</a>
              </div>
            </article>

            <article class="about-contact-card reveal">
              <div class="about-contact-card__line">
                <span class="contact-icon contact-icon--wechat" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.55" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9.2 17.6c-3.6 0-6.2-2.4-6.2-5.6s2.8-5.8 6.8-5.8 6.8 2.5 6.8 5.7c0 1.2-.4 2.4-1.2 3.3l.8 2.8-2.8-1.1a8.3 8.3 0 0 1-4.2 1.1Z"></path>
                    <path d="M15.5 18.4c.7.3 1.5.5 2.3.5 3.1 0 5.2-1.9 5.2-4.5 0-2.3-1.9-4.1-4.5-4.4"></path>
                    <circle cx="8.3" cy="11.7" r=".75" fill="currentColor" stroke="none"></circle>
                    <circle cx="11.9" cy="11.7" r=".75" fill="currentColor" stroke="none"></circle>
                    <circle cx="16.7" cy="14.1" r=".72" fill="currentColor" stroke="none"></circle>
                    <circle cx="19.4" cy="14.1" r=".72" fill="currentColor" stroke="none"></circle>
                  </svg>
                </span>
                <a class="about-contact-card__handle about-contact-card__handle--wechat" href="#" id="about-contact-phone">15058160550</a>
              </div>
            </article>

            <article class="about-contact-card reveal" id="about-contact-pdf-card" hidden>
              <div class="about-contact-card__line">
                <span class="contact-icon contact-icon--pdf" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.55" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M8 3.5h6.3L19 8.2V19a1.8 1.8 0 0 1-1.8 1.8H8A1.8 1.8 0 0 1 6.2 19V5.3A1.8 1.8 0 0 1 8 3.5Z"></path>
                    <path d="M14.1 3.8v4.4h4.3"></path>
                    <path d="M8.8 15.5h6.5"></path>
                    <path d="M8.8 12.4h4.8"></path>
                  </svg>
                </span>
                <a class="about-contact-card__handle about-contact-card__handle--pdf" href="#" id="about-contact-pdf" download>PDF Download</a>
              </div>
            </article>
          </div>
        </section>
      </section>
    </main>

    <footer class="site-footer">
      <div class="site-footer__inner">
        <span><span data-artist-name>Lu Han</span> / <span data-current-year></span></span>
        <div class="site-footer__links">

          <span>LUHAN All rights reserved.</span>

        </div>
      </div>
    </footer>
  </body>
</html>
