<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2024 / Lu Han</title>
    <meta name="description" content="Year archive 2024 for Lu Han.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../assets/js/site-data.js" defer></script>
    <script src="../assets/js/site.js" defer></script>
  </head>
  <body data-page="archive-year" data-base=".." data-year="2024">
    <header class="site-header">
      <div class="site-header__inner">
        <a class="brand" href="../index.html" aria-label="Lu Han home">
          <span class="brand__crest" aria-hidden="true"></span>
          <span class="brand__meta">
            <strong class="brand__name" data-artist-name>Lu Han</strong>
          </span>
        </a>
        <div class="site-nav">
          <nav class="site-nav__links" aria-label="Primary">
            <a href="../index.html" data-i18n="nav.home">Home</a>
            <a href="./index.html" aria-current="page" data-i18n="nav.works">Works</a>
            <a href="../about.html" data-i18n="nav.aboutContact">About&Contact</a>
          </nav>
          <div class="language-toggle" aria-label="Language switcher">
            <button class="language-toggle__button" type="button" data-lang-button="en">EN</button>
            <button class="language-toggle__button" type="button" data-lang-button="zh">中文</button>
          </div>
        </div>
      </div>
    </header>

    <main class="main page-shell">
      <section class="site-shell site-shell--wide">
        <div class="archive-head reveal">
          <div class="archive-topline">
            <a class="ghost-link" href="./index.html" data-i18n="archive.back">Back</a>
          </div>
          <div class="archive-topline">
            <h1 class="archive-title">2024</h1>
            <div class="archive-meta">
              <span data-i18n="archive.meta">Archive</span>
              <span class="archive-meta__divider" aria-hidden="true"></span>
              <span id="archive-count">0 works</span>
            </div>
          </div>
          <p class="archive-copy" id="archive-copy"></p>
        </div>

        <div class="archive-grid" id="archive-grid"></div>
      </section>
    </main>

    <div class="modal" id="artwork-modal" hidden>
      <button class="modal__backdrop" type="button" data-modal-close data-i18n-aria="archive.modalClose" aria-label="Close"></button>
      <div class="modal__dialog" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <button class="modal__close" type="button" data-modal-close data-i18n-aria="archive.modalClose" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true">
            <path d="M6 6l12 12M18 6L6 18"></path>
          </svg>
        </button>
        <figure class="modal__figure">
          <img id="modal-image" src="" alt="">
        </figure>
        <div class="modal__body">
          <p class="modal__eyebrow" id="modal-eyebrow"></p>
          <h2 class="modal__title" id="modal-title"></h2>
          <div class="modal__meta-grid">
            <div class="modal__meta-row">
              <span class="modal__meta-label" data-i18n="archive.modalYear">Year</span>
              <p class="modal__meta-value" id="modal-year"></p>
            </div>
            <div class="modal__meta-row">
              <span class="modal__meta-label" data-i18n="archive.modalMedium">Medium</span>
              <p class="modal__meta-value" id="modal-medium"></p>
            </div>
            <div class="modal__meta-row">
              <span class="modal__meta-label" data-i18n="archive.modalSize">Size</span>
              <p class="modal__meta-value" id="modal-size"></p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <footer class="site-footer">
      <div class="site-footer__inner">
        <span><span data-artist-name>Lu Han</span> / <span data-current-year></span></span>
        <div class="site-footer__links">

          <span>LUHAN All rights reserved.</span>

        </div>
      </div>
    </footer>
  </body>
</html>
